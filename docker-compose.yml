services:
  db:
    image: postgres:17
    container_name: grounded-art-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grounded
      POSTGRES_PASSWORD: grounded
      POSTGRES_DB: grounded_art
    ports:
      - "5432:5432"
    volumes:
      - grounded-art-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grounded -d grounded_art"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: grounded-art-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://grounded:grounded@db:5432/grounded_art
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3001","http://localhost:8080","https://app.grounded-art.co.za"]}
      REDESIGN_SCHEMA_ENABLED: "true"
      SESSION_COOKIE_PATH: /
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-Grounded Art <noreply@grounded-art.co.za>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_API_URL: ${RESEND_API_URL:-https://api.resend.com/emails}
      CONTACT_NOTIFICATION_TO: ${CONTACT_NOTIFICATION_TO:-hello@grounded-art.co.za}
      CONTACT_NOTIFICATION_FROM: ${CONTACT_NOTIFICATION_FROM:-Grounded Art <notifications@grounded-art.co.za>}
      CONTACT_NOTIFICATION_REPLY_TO_SUBMITTER: ${CONTACT_NOTIFICATION_REPLY_TO_SUBMITTER:-true}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      LOGIN_CODE_PEPPER: ${LOGIN_CODE_PEPPER:-dev-pepper-change-in-production}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_COOKIE_PATH: ${NEXT_PUBLIC_COOKIE_PATH:-/}
    container_name: grounded-art-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      WEB_SESSION_COOKIE_PATH: /
      NEXT_PUBLIC_COOKIE_PATH: /
    ports:
      - "${WEB_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/feed').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  caddy:
    image: caddy:2-alpine
    container_name: grounded-art-proxy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    environment:
      APP_HOST: ${APP_HOST:-:80}
      API_HOST: ${API_HOST:-api.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - grounded-art-caddy-data:/data
      - grounded-art-caddy-config:/config

volumes:
  grounded-art-db-data:
  grounded-art-caddy-data:
  grounded-art-caddy-config:
