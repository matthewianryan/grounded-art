# Cloudflare Pages config for the Grounded Art landing app.
# The landing site is a fully static Next.js export (`pnpm pages:build`),
# emitted to ./out, which Cloudflare Pages serves directly.
# DNS stays at the registrar; the custom domain is attached via an external
# CNAME to <project>.pages.dev (Pages supports off-Cloudflare DNS).
name = "grounded-art-landing"
compatibility_date = "2025-06-24"
pages_build_output_dir = "out"
